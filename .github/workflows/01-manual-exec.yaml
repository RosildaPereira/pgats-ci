# CI de Nível 01 - Disparo Manual através de clique

# nome da pipeline
name: "Execução Manual"

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
    workflow_dispatch:

#tarefas dentro da pipeline = jobs

jobs:
    #nome do job
    e2e-tests:
        # maquina onde o job vai rodar
        runs-on: ubuntu-latest

        # passos do job
        steps:
            # clone do projeto
            - uses: actions/checkout@v4

            # instalção do node
            - uses: actions/setup-node@v4
              with:
                  node-version: 24.x

            # instalação do Yarn
            - name: Instalando Yarn
              run: npm install -g yarn
            
            #   instalação das dependências
            - name: Instalando dependências
              run: yarn
            
            # instalação dos Browsers do Playwright
            - name: Instalando Browsers do Playwright
              run: yarn playwright install
            
            # executar os testes e2e
            - name: Executando testes e2e
              run: yarn run e2e

            # gerar o relatório do Playwright
            - name: Upload Playwright HTML report
              uses: actions/upload-artifact@v4
              with:
               name: playwright-report
               path: playwright-report
               
    name: Execução Manual

    on:
      workflow_dispatch:   # permite rodar manualmente
      push:                # também dispara em push

        jobs:
            teste-runner:
            runs-on: self-hosted   # usa o runner da sua máquina
            steps:
            - name: Mensagem de teste
             run: echo "Olá Rosilda, o runner está funcionando no exercício 3!"




               
